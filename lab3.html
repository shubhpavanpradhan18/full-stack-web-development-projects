<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Hackathon Registration Portal</title>

<link rel="stylesheet" href="lab3.css">

</head>

<body>

<header>

<h1>Hackathon 2026 Registration</h1>

<p>Code • Create • Innovate</p>

</header>

<div class="container">

<h2>Participant Registration Form</h2>

<form id="registrationForm">

<label>Full Name</label>

<input
type="text"
id="name"
placeholder="Enter your name"
required>

<label>Password</label>

<input
type="password"
id="password"
placeholder="Enter password"
required>

<label>Email</label>

<input
type="email"
id="email"
placeholder="Enter email"
required>

<label>Phone Number</label>

<input
type="tel"
id="phone"
placeholder="Enter phone number"
pattern="[0-9]{10}"
required>

<label>Date of Birth</label>

<input
type="date"
id="dob"
required>

<label>Gender</label>

<div class="radio">

<input
type="radio"
name="gender"
value="Male"
required> Male

<input
type="radio"
name="gender"
value="Female"> Female

<input
type="radio"
name="gender"
value="Other"> Other

</div>

<label>Hackathon Track</label>

<select id="track" required>

<option value="">Select Track</option>

<option>Artificial Intelligence</option>

<option>Web Development</option>

<option>Cyber Security</option>

<option>Cloud Computing</option>

<option>Data Science</option>

</select>

<label>Skills</label>

<div class="check">

<input type="checkbox" value="HTML" name="skill"> HTML

<input type="checkbox" value="CSS" name="skill"> CSS

<input type="checkbox" value="JavaScript" name="skill"> JavaScript

<input type="checkbox" value="Python" name="skill"> Python

<input type="checkbox" value="Java" name="skill"> Java

</div>

<label>Why do you want to participate?</label>

<textarea
id="reason"
rows="4"
placeholder="Write here..."
required></textarea>

<label>Upload Resume</label>

<input
type="file"
id="resume"
required>

<button
type="button"
id="registerBtn">

Register

</button>

</form>

</div>

<div class="card" id="outputCard">

<h2>Registration Details</h2>

<p><strong>Name :</strong> <span id="cardName"></span></p>

<p><strong>Email :</strong> <span id="cardEmail"></span></p>

<p><strong>Phone :</strong> <span id="cardPhone"></span></p>

<p><strong>Date of Birth :</strong> <span id="cardDob"></span></p>

<p><strong>Gender :</strong> <span id="cardGender"></span></p>

<p><strong>Track :</strong> <span id="cardTrack"></span></p>

<p><strong>Skills :</strong> <span id="cardSkills"></span></p>

<p><strong>Reason :</strong> <span id="cardReason"></span></p>

<p><strong>Resume :</strong> <span id="cardResume"></span></p>

</div>

<script src="script.js"></script>

</body>

</html>
